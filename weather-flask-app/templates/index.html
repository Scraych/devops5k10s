<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Парсер погоды</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-right: 5px; }
        .btn-green { background: #28a745; }
        .city-list { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .city-btn { background: #6c757d; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Парсер погоды</h1>
    <p>Введите координаты или выберите город из списка:</p>

    <form id="weatherForm">
        <div class="form-group">
            <label for="lat">Широта:</label>
            <input type="text" id="lat" name="lat" placeholder="55.7558" required>
        </div>

        <div class="form-group">
            <label for="lon">Долгота:</label>
            <input type="text" id="lon" name="lon" placeholder="37.6173" required>
        </div>
        
        <!-- Две кнопки вместо одной -->
        <div style="margin-top: 10px;">
            <button type="button" class="btn" onclick="navigateTo('weather')">Погода сейчас</button>
            <button type="button" class="btn btn-green" onclick="navigateTo('forecast')">Прогноз на неделю</button>
        </div>
    </form>

    <div class="city-list">
        <button class="city-btn" onclick="setCoords(48.7194, 44.5018)">Волгоград</button>
        <button class="city-btn" onclick="setCoords(55.7558, 37.6173)">Москва</button>
        <button class="city-btn" onclick="setCoords(59.9343, 30.3351)">Санкт-Петербург</button>
        <button class="city-btn" onclick="setCoords(51.5074, -0.1278)">Лондон</button>
        <button class="city-btn" onclick="setCoords(40.7128, -74.0060)">Нью-Йорк</button>
        <button class="city-btn" onclick="setCoords(35.6762, 139.6503)">Токио</button>
    </div>

    <script>
        // Функция перенаправления с координатами из формы
        function navigateTo(page) {
            var lat = document.getElementById('lat').value;
            var lon = document.getElementById('lon').value;
            
            // Простая проверка, чтобы не уходить с пустыми полями
            if(!lat || !lon) {
                alert('Пожалуйста, введите координаты или выберите город');
                return;
            }

            window.location.href = '/' + page + '?lat=' + lat + '&lon=' + lon;
        }

        // Функция заполнения полей городом
        function setCoords(lat, lon) {
            document.getElementById('lat').value = lat;
            document.getElementById('lon').value = lon;
        }
    </script>
</body>
</html>
