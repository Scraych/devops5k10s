name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Устанавливаем проект, чтобы работали импорты в тестах
        pip install -e .

    - name: Lint with flake8
      run: |
        # Остановка сборки при ошибках.
        # Конфигурация берется из файла .flake8
        flake8 . --count --show-source --statistics

    - name: Test with pytest
      run: |
        # Запускаем тесты из папки проекта
        cd weather-flask-app
        pytest -v
